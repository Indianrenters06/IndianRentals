name: Deploy backend (Hostinger VPS)

# Auto-deploys the Express API to the Hostinger VPS on every push to main
# that touches backend/. Can also be run manually from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:

# Avoid overlapping deploys if you push twice quickly.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS, pull & restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 31.97.202.194
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/IndianRentals
            git pull --ff-only
            cd backend
            npm install --omit=dev
            pm2 restart indianrentals-api --update-env
            pm2 save --force
            echo "Deployed $(git rev-parse --short HEAD) at $(date -u)"
