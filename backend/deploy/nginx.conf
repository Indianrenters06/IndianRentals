# Nginx reverse proxy for the IndianRentals API.
# Put this at: /etc/nginx/sites-available/indianrentals-api
# Then:  ln -s /etc/nginx/sites-available/indianrentals-api /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx
#        certbot --nginx -d api.indianrentals.com   # adds HTTPS automatically
#
# Replace api.indianrentals.com with your real subdomain everywhere below.

server {
    listen 80;
    listen [::]:80;
    server_name api.indianrentals.com;

    # Allow image uploads to pass through (multer holds them in memory before Cloudinary).
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_read_timeout 60s;
    }
}
