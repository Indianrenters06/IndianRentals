# Nginx config for IndianRentals on the Hostinger VPS.
#
# One hostname serves both apps, so the storefront and the API are same-origin
# (no CORS, one Let's Encrypt cert):
#   /          -> 127.0.0.1:3000   Next.js storefront (PM2: indianrentals-web)
#   /api       -> 127.0.0.1:5000   Express API        (PM2: indianrentals-api)
#   /uploads   -> 127.0.0.1:5000   API-served static uploads
#
# Put this at: /etc/nginx/sites-available/indianrentals-api
# Then:  ln -s /etc/nginx/sites-available/indianrentals-api /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx
#        certbot --nginx -d 31-97-202-194.sslip.io   # adds the HTTPS block below

upstream indianrentals_api {
    server 127.0.0.1:5000;
    keepalive 16;
}

upstream indianrentals_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    server_name 31-97-202-194.sslip.io;

    # Allow image uploads to pass through (multer holds them in memory before Cloudinary).
    client_max_body_size 25M;

    # --- API: every Express route is mounted under /api ---
    location /api {
        proxy_pass http://indianrentals_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }

    # --- Static files written by the API (express.static) ---
    location /uploads {
        proxy_pass http://indianrentals_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }

    # --- Next.js build assets: content-hashed, safe to cache hard ---
    location /_next/static {
        proxy_pass http://indianrentals_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Everything else: the Next.js storefront ---
    location / {
        proxy_pass http://indianrentals_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/31-97-202-194.sslip.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/31-97-202-194.sslip.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = 31-97-202-194.sslip.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name 31-97-202-194.sslip.io;
    return 404; # managed by Certbot
}
